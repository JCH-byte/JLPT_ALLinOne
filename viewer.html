<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Viewer</title>
    
    <!-- 분리된 CSS 파일 로드 -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/viewer.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/mobile.css">
    
    <!-- Font Awesome (아이콘용) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="viewer-mode">
    
    <div id="viewer-content">
        <header class="viewer-header">
            <div class="header-badges">
                <span class="badge-level" id="badge-level">JLPT</span>
            </div>
            <h1 id="header-title">Loading...</h1>
        </header>

        <!-- Section 1: Story (Conditional) -->
        <section id="section-story" class="study-section" style="display:none;">
            <h2 class="section-title"><i class="fas fa-book-open"></i> 문맥으로 익히기</h2>
            <div id="story-content" class="story-box"></div>
            
            <h3 class="sub-title">📌 구문 분석</h3>
            <div id="analysis-list"></div>
        </section>

        <!-- Section 2: Vocabulary -->
        <section id="section-vocab" class="study-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-font"></i> 핵심 단어</h2>
                
                <!-- View Mode Controls -->
                <div class="view-controls">
                    <button id="btn-mode-list" class="control-btn active" onclick="toggleViewMode('list')"><i class="fas fa-list"></i> 리스트</button>
                    <button id="btn-mode-card" class="control-btn" onclick="toggleViewMode('card')"><i class="fas fa-layer-group"></i> 카드</button>
                </div>
            </div>

            <!-- List View -->
            <div id="view-list">
                <div class="toolbar">
                    <button id="btn-toggle-mean" class="tool-btn" onclick="toggleMeanings()">🙈 뜻 가리기</button>
                </div>
                <table id="vocab-table">
                    <thead>
                        <tr>
                            <th width="40">★</th>
                            <th width="40"><i class="fas fa-check"></i></th>
                            <th>단어</th>
                            <th>읽기</th>
                            <th class="col-mean-header">의미</th>
                        </tr>
                    </thead>
                    <tbody id="vocab-tbody"></tbody>
                </table>
            </div>

            <!-- Flashcard View -->
            <div id="view-card" style="display:none;">
                <div class="flashcard-container">
                    <button class="nav-arrow left" onclick="prevCard()">❮</button>
                    
                    <div class="flashcard" id="flashcard" onclick="flipCard()">
                        <div class="card-face card-front">
                            <!-- JS Injected -->
                        </div>
                        <div class="card-face card-back">
                            <!-- JS Injected -->
                        </div>
                    </div>

                    <button class="nav-arrow right" onclick="nextCard()">❯</button>
                </div>
                <div id="card-counter" class="card-counter">1 / 10</div>
                <p class="card-tip">카드를 클릭하면 뒤집힙니다</p>
            </div>
        </section>

        <!-- Section 3: Quiz (Conditional) -->
        <section id="section-quiz" class="study-section" style="display:none;">
            <h2 class="section-title"><i class="fas fa-pencil-alt"></i> 실력 확인</h2>
            <div id="quiz-container" class="quiz-container"></div>
        </section>

        <!-- Navigation Footer -->
        <div class="nav-buttons">
            <a href="#" id="btn-prev" class="nav-btn prev">
                <span class="small">이전 Day</span>
            </a>
            <a href="index.html" target="_parent" class="nav-btn list">
                <i class="fas fa-bars"></i> 목록
            </a>
            <a href="#" id="btn-next" class="nav-btn next">
                <span class="small">다음 Day</span>
            </a>
        </div>
    </div>

    <!-- Firestore 콘텐츠 로딩 (jlpt_modules 컬렉션, 인증 불필요) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyDPKCmfvA_uepqu4MA8tzendnGRy-H6ZgI",
            authDomain: "jlpt-project-01.firebaseapp.com",
            projectId: "jlpt-project-01",
            storageBucket: "jlpt-project-01.firebasestorage.app",
            messagingSenderId: "828971360762",
            appId: "1:828971360762:web:5a9e9fa6948be5cdd20443"
        }));

        window.FirebaseBridge = window.FirebaseBridge || {};
        window.FirebaseBridge.getModuleContent = async (level, moduleId) => {
            try {
                const snap = await getDoc(doc(db, 'jlpt_modules', `${level}_${moduleId}`));
                return snap.exists() ? snap.data() : null;
            } catch (e) {
                console.warn('[Firestore] 읽기 실패, 정적 파일 사용:', e);
                return null;
            }
        };
    </script>

    <!-- 분리된 JS 파일 로드 (의존성 순서 중요) -->
    <script src="js/utils.js"></script>
    <script src="js/data-service.js"></script>
    <script src="js/bookmark-service.js"></script>
    <script src="js/quiz-controller.js"></script>
    <script src="js/flashcard-controller.js"></script>
    <script src="js/main-viewer.js"></script>
    
    <script>
        // DOM 로드 후 뷰어 초기화 실행
        document.addEventListener('DOMContentLoaded', initViewer);
    </script>
</body>
</html>
