<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JLPT 관리자 도구</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="container">
    <h1>🛠️ JLPT 관리자 도구</h1>

    <div class="control-panel">
        <label><strong>1. 레벨 선택:</strong></label>
        <select id="level-select">
            <option value="n5">N5 (기초 - 노랑)</option>
            <option value="n4">N4 (초급 - 초록)</option>
            <option value="n3">N3 (중급 - 파랑)</option>
            <option value="n2">N2 (중고급 - 주황)</option>
            <option value="n1">N1 (고급 - 빨강)</option>
        </select>

        <label style="margin-left:12px;"><strong>모듈:</strong></label>
        <select id="module-select">
            <option value="">로딩 중...</option>
        </select>
    </div>

    <h3>2. 입력 파이프라인 (Intake → Normalize → Validate)</h3>
    <div class="pipeline-grid">
        <div class="pipeline-step"><strong>Intake</strong><span id="status-intake">대기</span><button class="btn btn-step" onclick="runAiIntake()">1) Intake</button></div>
        <div class="pipeline-step"><strong>Normalize</strong><span id="status-normalize">대기</span><button class="btn btn-step" onclick="runNormalize()">2) Normalize</button></div>
        <div class="pipeline-step"><strong>Validate</strong><span id="status-validate">대기</span><button class="btn btn-step" onclick="runValidate()">3) Validate</button></div>
    </div>

    <h3>3. JSON 데이터 입력</h3>
    <textarea id="json-input" placeholder='{
  "title": "N4 Module 5: 일상 표현",
  "story": "今日は...",
  "analysis": [
    {"sentence": "今日は忙しい。", "breakdown": "今日(오늘) は(은) 忙しい(바쁘다)"}
  ],
  "vocab": [
    {"id": "v-001", "word": "準備", "read": "じゅんび", "mean": "준비", "tags": ["noun"]}
  ],
  "quiz": [
    {"q": "「準備」의 뜻은?", "opt": ["준비", "정리", "확인", "연습"], "ans": 0, "comment": ""}
  ]
}'></textarea>

    <h3 style="margin-top:24px;">4. Normalize 결과</h3>
    <pre id="normalized-preview" class="compare-result">Normalize 결과가 여기에 표시됩니다.</pre>

    <h3 style="margin-top:24px;">5. Validate 결과</h3>
    <pre id="validation-result" class="compare-result">Validate 단계를 실행하세요.</pre>

    <h3 style="margin-top:30px;">6. Firebase 업로드</h3>
    <div class="control-panel">
        <span id="firebase-auth-status">Firebase 초기화 중...</span>
        <button class="btn" id="firebase-login-btn" style="margin-left:12px;">로딩 중...</button>
    </div>
    <div style="margin-top:12px;">
        <button class="btn btn-approve" onclick="handleFirebaseUpload()">🚀 Firestore에 업로드</button>
    </div>
    <pre id="upload-result" class="compare-result">업로드 결과가 여기에 표시됩니다.</pre>

    <div style="margin-top:20px; text-align:right;">
        <button onclick="clearPreview()" style="border:none; background:none; text-decoration:underline; cursor:pointer; color:#999;">입력 초기화</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPKCmfvA_uepqu4MA8tzendnGRy-H6ZgI",
        authDomain: "jlpt-project-01.firebaseapp.com",
        projectId: "jlpt-project-01",
        storageBucket: "jlpt-project-01.firebasestorage.app",
        messagingSenderId: "828971360762",
        appId: "1:828971360762:web:5a9e9fa6948be5cdd20443"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.AdminFirebase = {
        user: null,
        login: async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                if (e.code === 'auth/unauthorized-domain') {
                    alert(`[도메인 승인 필요] Firebase Console에 도메인을 추가하세요:\n${window.location.hostname}`);
                } else {
                    alert('로그인 실패: ' + e.message);
                }
            }
        },
        logout: async () => {
            if (!confirm('로그아웃 하시겠습니까?')) return;
            await signOut(auth);
        },
        uploadModule: async (level, moduleId, data) => {
            const user = auth.currentUser;
            if (!user) throw new Error('로그인이 필요합니다.');
            const docId = `${level}_${moduleId}`;
            await setDoc(doc(db, 'jlpt_modules', docId), {
                level, moduleId, ...data,
                updatedAt: new Date().toISOString(),
                uploadedBy: user.email
            });
        }
    };

    onAuthStateChanged(auth, (user) => {
        window.AdminFirebase.user = user;
        const statusEl = document.getElementById('firebase-auth-status');
        const loginBtn = document.getElementById('firebase-login-btn');
        if (statusEl) {
            statusEl.textContent = user ? `● 로그인: ${user.email}` : '○ 로그인 필요';
        }
        if (loginBtn) {
            if (user) {
                loginBtn.textContent = '로그아웃';
                loginBtn.onclick = () => window.AdminFirebase.logout();
            } else {
                loginBtn.textContent = 'Google 로그인';
                loginBtn.onclick = () => window.AdminFirebase.login();
            }
        }
    });
</script>

<script src="js/admin-controller.js"></script>
</body>
</html>
