<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT All-in-One</title>
    
    <!-- 분리된 CSS 파일 로드 -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/dashboard.css">
    
</head>
<body class="dashboard-mode">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="app-title">
                <button class="sidebar-collapse-btn" onclick="toggleSidebarCollapse()">◀</button>
                JLPT 마스터
            </h1>
            
            <!-- [추가됨] 구글 로그인 영역 -->
            <div class="user-auth-section">
                <span id="user-info-display" class="user-name-display"></span>
                <button id="google-login-btn" class="google-btn">
                    <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18" aria-hidden="true">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    <span class="btn-text">Google 로그인</span>
                </button>
            </div>

            <!-- Bookmark Button -->
            <div class="starred-btn-wrap">
                <button onclick="loadStarredPage()" class="starred-btn">
                    <span class="btn-icon">⭐</span><span class="btn-text"> 나만의 단어장 보기</span>
                </button>
            </div>

            <!-- 5단계 레벨 탭 -->
            <div class="level-tabs">
                <button class="tab-btn" onclick="switchLevel('n5')">N5</button>
                <button class="tab-btn" onclick="switchLevel('n4')">N4</button>
                <button class="tab-btn" onclick="switchLevel('n3')">N3</button>
                <button class="tab-btn" onclick="switchLevel('n2')">N2</button>
                <button class="tab-btn" onclick="switchLevel('n1')">N1</button>
            </div>
            
            <!-- 진행률 표시 -->
            <div class="progress-section">
                <div class="progress-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span id="level-title">N4 진행률</span>
                        <span id="progress-text">0%</span>
                    </div>
                    <div style="background:#fff; height:8px; border-radius:4px; overflow:hidden;">
                        <div class="progress-bar-fill" id="progress-bar"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Day 목록 리스트 -->
        <ul class="day-list" id="day-list">
            <li style="padding:20px; text-align:center; color:#999;">데이터 로딩 중...</li>
        </ul>

        <div class="admin-link-wrap">
            <a href="admin.html" target="_blank" class="admin-link">⚙️<span class="btn-text"> 관리자 도구</span></a>
        </div>
    </aside>

    <!-- 모바일 사이드바 오버레이 -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- 메인 콘텐츠 영역 -->
    <div class="main-content">
        <div class="mobile-header">
            <button onclick="toggleSidebar()" style="border:none; background:none; font-size:1.5rem;">☰</button>
            <span style="margin-left:10px; font-weight:bold;">학습 뷰어</span>
        </div>
        <iframe id="content-frame" name="content-frame" allow="autoplay"></iframe>
    </div>

    <!-- 분리된 JS 파일 로드 -->
    <script src="js/data-service.js"></script>
    <script src="js/dashboard.js"></script>
    
    <!-- [추가됨] Firebase 모듈 (Type Module 필수) -->
    <!-- firebase-impl.js 파일이 js 폴더 안에 있다고 가정합니다. 루트에 있다면 src="firebase-impl.js"로 변경하세요 -->
    <script type="module" src="js/firebase-impl.js"></script>
</body>
</html>
